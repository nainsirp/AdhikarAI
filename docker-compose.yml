version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: adhikarai-db
    restart: always
    environment:
      POSTGRES_DB: adhikarai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adhikarai-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/adhikarai?schema=public
      - JWT_ACCESS_SECRET=super_secret_jwt_access_token_key_123456789
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_token_key_123456789
      - CLOUDINARY_CLOUD_NAME=your_cloudinary_cloud_name
      - CLOUDINARY_API_KEY=your_cloudinary_api_key
      - CLOUDINARY_API_SECRET=your_cloudinary_api_secret
      - GEMINI_API_KEY=your_gemini_api_key
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adhikarai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
