<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – AdhikarAI</title>
  <meta name="description" content="Sign in to your AdhikarAI account and access your AI-powered legal companion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow: hidden; }

    :root {
      --crimson: #8B1A1A;
      --crimson-dk: #6B1212;
      --charcoal: #1A1A1A;
      --mid-gray: #6B7280;
      --border: #E5E5E5;
      --warm-gray: #F5F5F5;
      --white: #FFFFFF;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      display: flex;
      height: 100vh;
      background: var(--warm-gray);
      overflow: hidden;
    }

    /* ── LEFT PANEL (form) ── */
    .auth-left {
      flex: 0 0 46%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 52px;
      background: var(--white);
      overflow: hidden;
    }

    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 20px 20px 20px 10px;
      background: var(--warm-gray);
    }
    .auth-right-inner {
      width: 100%;
      height: calc(100vh - 40px);
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .auth-right-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .auth-quote {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.25) 65%, transparent 100%);
      border-radius: 0 0 16px 16px;
    }
    .quote-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .quote-author {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      font-style: italic;
    }

    /* ── FORM ELEMENTS ── */
    .auth-logo {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .logo-adhikar { color: var(--charcoal); }
    .logo-ai      { color: var(--crimson); }

    .auth-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 0.82rem;
      color: var(--mid-gray);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 12px; }
    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: var(--font);
      color: var(--charcoal);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s ease;
    }
    .form-input::placeholder { color: #BCBCBC; }
    .form-input:focus { border-color: #AAAAAA; }

    .form-row-end {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }
    .forgot-link {
      font-size: 0.78rem;
      color: var(--crimson);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--crimson);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.01em;
    }
    .btn-login:hover {
      background: var(--crimson-dk);
      box-shadow: 0 4px 14px rgba(139,26,26,0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-dot {
      width: 10px; height: 10px;
      background: #333;
      border-radius: 2px;
      transform: rotate(45deg);
    }

    .social-btns {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      margin-bottom: 14px;
    }
    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--charcoal);
      background: var(--white);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }
    .btn-social:hover { background: var(--warm-gray); border-color: #CCC; box-shadow: 0 4px 14px rgba(0,0,0,0.10); }

    .auth-switch {
      text-align: center;
      font-size: 0.8rem;
      color: var(--mid-gray);
    }
    .auth-switch a {
      color: var(--crimson);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      body { flex-direction: column; }
      .auth-left { flex: none; padding: 32px 20px; overflow-y: auto; }
      .auth-right { flex: none; height: 240px; padding: 10px; }
      .auth-right-inner { height: 100%; }
      .social-btns { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- LEFT: FORM -->
  <div class="auth-left">
    <a href="index.html" class="auth-logo">
      <span class="logo-adhikar">Adhikar</span><span class="logo-ai">AI</span>
    </a>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to continue your journey toward justice.</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input class="form-input" type="email" id="login-email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required />
      </div>

      <div class="form-row-end">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="social-btns">
      <a href="#" class="btn-social" id="google-login">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </a>
      <a href="#" class="btn-social" id="apple-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Sign in with Apple
      </a>
    </div>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <!-- RIGHT: IMAGE + QUOTE -->
  <div class="auth-right">
    <div class="auth-right-inner">
      <img src="auth.png" alt="Indian woman in traditional attire representing strength and dignity" />
      <div class="auth-quote">
        <p class="quote-text">"You may encounter many defeats,<br>but you must not be defeated."</p>
        <p class="quote-author">— Maya Angelou</p>
      </div>
    </div>
  </div>

</body>
</html>
